<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>7B2 // SIGMA FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&family=Moul&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2ff;
            --neon-pink: #ff007f;
        }

        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background-color: #020205;
            color: #ffffff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .khmer-moul { font-family: 'Moul', cursive; }
        .font-sigma { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }

        .master-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(135deg, #020205 0%, #0a0a1a 100%);
        }

        /* Neon Creator Text */
        .neon-signature {
            color: #fff;
            text-shadow: 
                0 0 7px var(--cyan),
                0 0 10px var(--cyan),
                0 0 21px var(--cyan),
                0 0 42px var(--cyan);
            animation: neonPulse 1.5s infinite alternate;
        }

        @keyframes neonPulse {
            from { text-shadow: 0 0 5px var(--cyan), 0 0 10px var(--cyan), 0 0 15px var(--cyan); }
            to { text-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan), 0 0 30px var(--cyan), 0 0 40px var(--cyan); }
        }

        .portal-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        @media (min-width: 768px) { .portal-container { flex-direction: row; } }

        .btn-choice {
            width: 100%;
            max-width: 350px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-choice:hover {
            border-color: var(--cyan);
            background: rgba(0, 242, 255, 0.05);
        }

        .notif-stack {
            position: fixed;
            top: 20px;
            right: 15px;
            z-index: 9999;
            pointer-events: none;
        }

        .notif-card {
            width: 280px;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            border-left: 3px solid var(--cyan);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(150%);
            transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            pointer-events: auto;
        }

        .notif-card.active { transform: translateX(0); }

        .card-glass {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px;
            transition: 0.5s;
        }

        .card-active {
            border-color: var(--cyan);
            background: rgba(0, 242, 255, 0.04);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .item-box {
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 8px;
            padding: 10px 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="master-bg"></div>

    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/m07uk3.mp4" type="audio/mp4">
    </audio>
    <audio id="notifSfx">
        <source src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- SELECTOR -->
    <div id="selector" class="portal-container">
        <div onclick="initApp('morning')" class="btn-choice">
            <span class="text-6xl mb-4 block">🌅</span>
            <h2 class="khmer-moul text-2xl">ពេលព្រឹក</h2>
            <p class="font-sigma text-[8px] text-cyan-400 opacity-50 uppercase mt-2">Mode: Early Bird</p>
        </div>
        <div onclick="initApp('afternoon')" class="btn-choice">
            <span class="text-6xl mb-4 block">☀️</span>
            <h2 class="khmer-moul text-2xl text-pink-500">ពេលថ្ងៃ</h2>
            <p class="font-sigma text-[8px] text-pink-500 opacity-50 uppercase mt-2">Mode: Afternoon Sigma</p>
        </div>
    </div>

    <!-- APP -->
    <div id="mainApp" class="hidden">
        <div id="notifStack" class="notif-stack"></div>

        <header class="p-6 max-w-6xl mx-auto flex flex-col items-center gap-6">
            <div class="flex items-center gap-4 w-full justify-start">
                <div class="w-12 h-12 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center text-2xl">⚡</div>
                <div>
                    <h2 class="khmer-moul text-lg">កាលវិភាគ 7B2</h2>
                    <p id="sessionTag" class="font-sigma text-[8px] text-cyan-400 uppercase"></p>
                </div>
            </div>

            <div class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-center">
                <div id="clock" class="font-sigma text-4xl mb-1">00:00:00</div>
                <div id="date" class="khmer-moul text-[9px] opacity-40 uppercase"></div>
            </div>
        </header>

        <main id="scheduleGrid" class="max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-12">
            <!-- Items injected by JS -->
        </main>

        <footer class="py-16 text-center">
            <p class="font-sigma text-[8px] opacity-20 mb-4 tracking-[1.5em]">CREATED BY</p>
            <h2 class="khmer-moul text-3xl neon-signature">មាស ប៊ុណ្ណាVit</h2>
        </footer>
    </div>

    <script>
        const scheduleData = [
            { day: 'ចន្ទ (Monday)', list: ['អង់គ្លេស', 'ប្រវត្តិវិទ្យា', 'គណិតវិទ្យា', 'គណិតវិទ្យា'], times: ['13:00', '14:00', '15:00', '16:00'] },
            { day: 'អង្គារ (Tuesday)', list: ['អក្សរសាស្ត្រខ្មែរ', 'ភាសាចិន', 'ផែនដីវិទ្យា', 'ភូមិវិទ្យា'], times: ['13:00', '14:00', '15:00', '16:00'] },
            { day: 'ពុធ (Wednesday)', list: ['គណិតវិទ្យា', 'គណិតវិទ្យា', 'គីមីវិទ្យា', 'ជីវវិទ្យា'], times: ['13:00', '14:00', '15:00', '16:00'] },
            { day: 'ព្រហស្បតិ៍ (Thursday)', list: ['អក្សរសាស្ត្រខ្មែរ', 'អក្សរសាស្ត្រខ្មែរ', 'សីលធម៌-ពលរដ្ឋ', 'ជីវវិទ្យា'], times: ['13:00', '14:00', '15:00', '16:00'] },
            { day: 'សុក្រ (Friday)', list: ['អក្សរសាស្ត្រខ្មែរ', 'អក្សរសាស្ត្រខ្មែរ', 'សីលធម៌-ពលរដ្ឋ', 'រូបវិទ្យា'], times: ['13:00', '14:00', '15:00', '16:00'] },
            { day: 'សៅរ៍ (Saturday)', list: ['ភូមិវិទ្យា', 'គណិតវិទ្យា', 'គណិតវិទ្យា', 'អង់គ្លេស'], times: ['13:00', '14:00', '15:00', '16:00'] }
        ];

        const avatars = [
            { n: "SIGMA BOY", p: "https://files.catbox.moe/7d1nsp.jpeg" },
            { n: "The me", p: "https://files.catbox.moe/3nnv91.jpeg" },
            { n: "Alien", p: "https://files.catbox.moe/ktl2m7.jpeg" },
            { n: "Your Boyfriend", p: "https://files.catbox.moe/0g2t2o.jpeg" }
        ];

        const music = document.getElementById('bgMusic');
        const sfx = document.getElementById('notifSfx');

        // STOP SOUND ON TAB LEAVE
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                music.pause();
            } else {
                if (!document.getElementById('mainApp').classList.contains('hidden')) {
                    music.play().catch(() => {});
                }
            }
        });

        function initApp(mode) {
            music.play().catch(() => {});
            document.getElementById('selector').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('sessionTag').innerText = `SESSION // ${mode}`;
            
            renderGrid();
            
            // AUTO SCROLL TO TODAY
            setTimeout(() => {
                const active = document.querySelector('.card-active');
                if (active) {
                    active.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                startNotifs();
            }, 600);
        }

        function startNotifs() {
            const stack = document.getElementById('notifStack');
            avatars.forEach((a, i) => {
                setTimeout(() => {
                    if (document.hidden) return; // Don't play if tab is hidden
                    sfx.currentTime = 0;
                    sfx.play().catch(() => {});

                    const div = document.createElement('div');
                    div.className = 'notif-card';
                    div.innerHTML = `
                        <img src="${a.p}" style="width:45px; height:45px; border-radius:8px; border:1px solid var(--cyan)">
                        <div>
                            <p class="font-sigma text-[6px] text-cyan-400">DATA_PKT_REC</p>
                            <p class="text-[11px] font-bold">${a.n}</p>
                        </div>
                    `;
                    stack.appendChild(div);
                    setTimeout(() => div.classList.add('active'), 50);
                    setTimeout(() => {
                        div.classList.remove('active');
                        setTimeout(() => div.remove(), 600);
                    }, 4000);
                }, i * 2000);
            });
        }

        function renderGrid() {
            const grid = document.getElementById('scheduleGrid');
            grid.innerHTML = '';
            
            const pph = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Phnom_Penh"}));
            let day = pph.getDay(); // 0-6
            let hr = pph.getHours();
            // If it's night (past 9 PM), show next day
            let target = (hr >= 21) ? (day + 1) % 7 : day;

            scheduleData.forEach((item, idx) => {
                const currentDayIndex = idx + 1; // Mon=1, Sat=6
                const isActive = (currentDayIndex === target);
                
                const card = document.createElement('div');
                card.className = `card-glass ${isActive ? 'card-active' : 'opacity-25'}`;

                let subjects = '';
                item.list.forEach((sub, sIdx) => {
                    subjects += `
                        <div class="item-box">
                            <span class="text-xs font-bold">${sub}</span>
                            <span class="font-sigma text-[7px] text-cyan-400 opacity-60">${item.times[sIdx]}</span>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="khmer-moul text-sm ${isActive ? 'text-cyan-400' : ''}">${item.day}</h3>
                        ${isActive ? '<span class="px-2 py-0.5 bg-cyan-500 text-black font-sigma text-[6px] rounded font-bold">TODAY</span>' : ''}
                    </div>
                    <div>${subjects}</div>
                `;
                grid.appendChild(card);
            });
        }

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleString("en-US", {timeZone: "Asia/Phnom_Penh", hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false});
            const dateStr = now.toLocaleString("km-KH", {timeZone: "Asia/Phnom_Penh", weekday: 'long', day: 'numeric', month: 'long'});
            document.getElementById('clock').innerText = timeStr;
            document.getElementById('date').innerText = dateStr;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>

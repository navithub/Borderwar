<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7B2 // PREMIER AUDIO STATION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&family=Moul&family=Orbitron:wght@600;900&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #7000ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Kantumruy Pro', sans-serif;
            background: #020205;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Dynamic Mesh Background */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.15) 0%, transparent 50%),
                #020205;
        }

        .khmer-moul { font-family: 'Moul', cursive; }
        .font-gamer { font-family: 'Orbitron', sans-serif; }

        /* Portal Selector */
        .portal-container {
            display: flex;
            height: 100vh;
            padding: 2rem;
            gap: 2rem;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .portal-card {
            flex: 1;
            height: 60vh;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(20px);
        }

        .portal-card:hover {
            transform: translateY(-15px);
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        /* Floating Notifications */
        .notif-stack {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }

        .notif-item {
            width: 280px;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid var(--primary);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(150%);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .notif-item.show { transform: translateX(0); }

        .notif-img {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid var(--primary);
        }

        /* Glass Cards */
        .glass-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            transition: all 0.3s;
        }

        .today-active {
            border-color: var(--primary);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
        }

        .neon-glow {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        /* Audio Control */
        #audioStatus {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 10px;
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 20px;
            display: none;
        }

        @media (max-width: 768px) {
            .portal-container { flex-direction: column; height: auto; padding-top: 10vh; }
            .portal-card { height: 35vh; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>
    
    <!-- Audio Element -->
    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/m07uk3.mp4" type="audio/mp4">
    </audio>
    <div id="audioStatus">🔊 AUDIO SYNCED</div>

    <!-- Notification Container -->
    <div id="notifArea" class="notif-stack"></div>

    <!-- SELECTOR -->
    <div id="selectorScreen" class="portal-container">
        <div onclick="initApp('morning')" class="portal-card">
            <div class="text-6xl mb-4">🌅</div>
            <h2 class="khmer-moul text-4xl">ពេលព្រឹក</h2>
            <p class="font-gamer text-[10px] tracking-[0.5em] text-cyan-400 opacity-50 mt-4">STATION_01</p>
        </div>
        <div onclick="initApp('afternoon')" class="portal-card">
            <div class="text-6xl mb-4">☀️</div>
            <h2 class="khmer-moul text-4xl text-purple-400">ពេលថ្ងៃ</h2>
            <p class="font-gamer text-[10px] tracking-[0.5em] text-purple-400 opacity-50 mt-4">STATION_02</p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden pb-20">
        <header class="max-w-7xl mx-auto p-6 md:p-10 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-6">
                <div class="w-14 h-14 rounded-2xl bg-cyan-500 flex items-center justify-center text-2xl shadow-[0_0_20px_rgba(0,242,255,0.4)]">⚡</div>
                <div>
                    <h1 class="khmer-moul text-2xl md:text-3xl neon-glow">កាលវិភាគ 7B2</h1>
                    <p id="modeInfo" class="font-gamer text-[9px] tracking-[0.4em] text-cyan-400"></p>
                </div>
            </div>

            <div class="glass-card px-10 py-4 text-center">
                <div id="clock" class="font-gamer text-3xl neon-glow">00:00:00</div>
                <div id="dateDisplay" class="khmer-moul text-[10px] opacity-40">ថ្ងៃ... ខែ...</div>
            </div>
        </header>

        <main id="scheduleGrid" class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-4">
            <!-- Cards -->
        </main>

        <footer class="mt-20 text-center">
            <p class="font-gamer text-[10px] tracking-[1em] opacity-20">SIGMA AUDIO SYSTEM</p>
            <p class="khmer-moul text-lg bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">មាស ប៊ុណ្ណាVit</p>
        </footer>
    </div>

    <script>
        const subjects = [
            { day: 'ចន្ទ (Monday)', sessions: ['អង់គ្លេស', 'ប្រវត្តិវិទ្យា', 'គណិតវិទ្យា', 'គណិតវិទ្យា'], times: ['13:00', '14:00', '15:00', '16:00'] },
            { day: 'អង្គារ (Tuesday)', sessions: ['អក្សរសាស្ត្រខ្មែរ', 'ភាសាចិន', 'ផែនដីវិទ្យា', 'ភូមិវិទ្យា'], times: ['13:00', '14:00', '15:00', '16:00'] },
            { day: 'ពុធ (Wednesday)', sessions: ['គណិតវិទ្យា', 'គណិតវិទ្យា', 'គីមីវិទ្យា', 'ជីវវិទ្យា'], times: ['13:00', '14:00', '15:00', '16:00'] },
            { day: 'ព្រហស្បតិ៍ (Thursday)', sessions: ['អក្សរសាស្ត្រខ្មែរ', 'អក្សរសាស្ត្រខ្មែរ', 'សីលធម៌-ពលរដ្ឋ', 'ជីវវិទ្យា'], times: ['13:00', '14:00', '15:00', '16:00'] },
            { day: 'សុក្រ (Friday)', sessions: ['អក្សរសាស្ត្រខ្មែរ', 'អក្សរសាស្ត្រខ្មែរ', 'សីលធម៌-ពលរដ្ឋ', 'រូបវិទ្យា'], times: ['13:00', '14:00', '15:00', '16:00'] },
            { day: 'សៅរ៍ (Saturday)', sessions: ['ភូមិវិទ្យា', 'គណិតវិទ្យា', 'គណិតវិទ្យា', 'អង់គ្លេស'], times: ['13:00', '14:00', '15:00', '16:00'] }
        ];

        const alerts = [
            { title: "SIGMA BOY", img: "https://files.catbox.moe/7d1nsp.jpeg" },
            { title: "The me", img: "https://files.catbox.moe/3nnv91.jpeg" },
            { title: "Alien", img: "https://files.catbox.moe/ktl2m7.jpeg" },
            { title: "Your Boyfriend", img: "https://files.catbox.moe/0g2t2o.jpeg" }
        ];

        const audio = document.getElementById('bgMusic');

        // VISIBILITY API: Pause music when leaving tab
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                audio.pause();
            } else {
                if (document.getElementById('dashboard').style.display === 'block') {
                    audio.play();
                }
            }
        });

        function initApp(mode) {
            // Start Audio
            audio.play().catch(e => console.log("Audio needs interaction"));
            document.getElementById('audioStatus').style.display = 'block';

            document.getElementById('modeInfo').innerText = `PROTOCOL: ${mode.toUpperCase()}`;
            document.getElementById('selectorScreen').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('selectorScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                
                renderGrid();
                triggerAlerts();
                
                // Scroll focus
                setTimeout(() => {
                    const focus = document.getElementById('active-card');
                    if (focus) focus.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 500);
            }, 500);
        }

        function triggerAlerts() {
            const container = document.getElementById('notifArea');
            alerts.forEach((a, i) => {
                setTimeout(() => {
                    const item = document.createElement('div');
                    item.className = 'notif-item';
                    item.innerHTML = `
                        <img src="${a.img}" class="notif-img">
                        <div>
                            <p class="font-gamer text-[7px] text-cyan-400">ACTIVE_SIGNAL</p>
                            <p class="font-bold text-sm">${a.title}</p>
                        </div>
                    `;
                    container.appendChild(item);
                    setTimeout(() => item.classList.add('show'), 100);
                    setTimeout(() => {
                        item.classList.remove('show');
                        setTimeout(() => item.remove(), 500);
                    }, 4000);
                }, i * 1500);
            });
        }

        function renderGrid() {
            const grid = document.getElementById('scheduleGrid');
            grid.innerHTML = '';
            
            const now = new Date();
            const pph = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Phnom_Penh"}));
            let dIdx = pph.getDay();
            let hr = pph.getHours();

            let target = dIdx;
            if (hr >= 21) target = (dIdx + 1) % 7;

            subjects.forEach((item, index) => {
                const dayVal = index + 1;
                const isToday = (dayVal === target);
                
                const card = document.createElement('div');
                if (isToday) card.id = 'active-card';
                card.className = `glass-card p-8 ${isToday ? 'today-active scale-105 z-10' : 'opacity-25'}`;

                let html = '';
                item.sessions.forEach((s, i) => {
                    html += `
                        <div class="flex items-center justify-between py-3 border-b border-white/5 last:border-0">
                            <span class="font-bold text-lg">${s}</span>
                            <span class="font-gamer text-[8px] opacity-40">${item.times[i]}</span>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="khmer-moul text-xl ${isToday ? 'neon-glow text-cyan-400' : ''}">${item.day}</h3>
                        ${isToday ? `<span class="bg-cyan-500 text-black font-gamer text-[8px] px-2 rounded">FOCUS</span>` : ''}
                    </div>
                    <div class="space-y-1">${html}</div>
                `;
                grid.appendChild(card);
            });
        }

        function clock() {
            const now = new Date();
            const time = now.toLocaleString("en-US", {timeZone: "Asia/Phnom_Penh", hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false});
            const date = now.toLocaleString("km-KH", {timeZone: "Asia/Phnom_Penh", weekday: 'long', day: 'numeric', month: 'long'});
            document.getElementById('clock').innerText = time;
            document.getElementById('dateDisplay').innerText = date;
        }

        setInterval(clock, 1000);
        clock();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>7B2 // VECTOR SHIFT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&family=Moul&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2ff;
            --purple: #7000ff;
            --gold: #ffcc00;
        }

        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background: #020205;
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
        }

        .khmer-moul { font-family: 'Moul', cursive; }
        .font-sigma { font-family: 'Orbitron', sans-serif; letter-spacing: 3px; }

        /* 3D Choose Screen UI */
        .portal-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1500px;
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
        }

        .choice-container {
            display: flex;
            gap: 40px;
            width: 90%;
            max-width: 1000px;
            transform-style: preserve-3d;
        }

        .choice-card {
            flex: 1;
            height: 450px;
            position: relative;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* The "Cool" Glow Effect */
        .choice-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, var(--glow-color), transparent 70%);
            opacity: 0;
            transition: 0.5s;
            z-index: -1;
        }

        .choice-card:hover {
            transform: translateZ(50px) rotateX(5deg) rotateY(-5deg);
            border-color: var(--glow-color);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.15);
        }

        .choice-card:hover::before { opacity: 0.3; }

        .choice-card .icon {
            font-size: 6rem;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 20px var(--glow-color));
            transition: 0.5s;
        }

        .choice-card:hover .icon {
            transform: scale(1.2) translateZ(30px);
        }

        /* Floating elements in background */
        .particles {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        /* Notifications with improved SFX and Glass */
        .notif-stack {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sigma-notif {
            width: 330px;
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(25px);
            border-right: 4px solid var(--cyan);
            border-radius: 20px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            transform: translateX(120%);
            transition: 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .sigma-notif.show { transform: translateX(0); }

        .notif-avatar {
            width: 65px;
            height: 65px;
            border-radius: 15px;
            object-fit: cover;
            border: 2px solid var(--cyan);
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: var(--cyan);
            width: 100%;
            transform-origin: left;
        }

        @media (max-width: 768px) {
            .choice-container { flex-direction: column; height: auto; padding: 20px; }
            .choice-card { height: 300px; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <!-- AUDIO SYSTEM -->
    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/m07uk3.mp4" type="audio/mp4">
    </audio>
    <audio id="pingSound">
        <source src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- SELECTOR SCREEN -->
    <div id="selector" class="portal-wrapper">
        <div class="choice-container">
            <div onclick="launch('morning')" class="choice-card" style="--glow-color: var(--cyan);">
                <div class="icon">🌅</div>
                <h2 class="khmer-moul text-4xl mb-4">ពេលព្រឹក</h2>
                <p class="font-sigma text-[10px] opacity-40">STATION_MORNING</p>
            </div>
            <div onclick="launch('afternoon')" class="choice-card" style="--glow-color: var(--purple);">
                <div class="icon">☀️</div>
                <h2 class="khmer-moul text-4xl mb-4 text-purple-400">ពេលថ្ងៃ</h2>
                <p class="font-sigma text-[10px] opacity-40">STATION_AFTERNOON</p>
            </div>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="app" class="hidden min-h-screen">
        <div class="notif-stack" id="notifArea"></div>

        <nav class="p-8 max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center gap-6">
                <div class="w-16 h-16 rounded-[24px] bg-gradient-to-br from-cyan-400 to-blue-700 flex items-center justify-center text-3xl shadow-xl">🔱</div>
                <div>
                    <h1 class="khmer-moul text-3xl">កាលវិភាគ 7B2</h1>
                    <p id="modeStatus" class="font-sigma text-[8px] text-cyan-400 mt-1"></p>
                </div>
            </div>
            
            <div class="bg-white/5 border border-white/10 px-10 py-5 rounded-[30px] mt-6 md:mt-0">
                <div id="clock" class="font-sigma text-4xl">00:00:00</div>
                <div id="date" class="khmer-moul text-[10px] opacity-40 text-center"></div>
            </div>
        </nav>

        <main id="scheduleGrid" class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-12 pb-20">
            <!-- Dynamic Grid -->
        </main>

        <footer class="py-20 text-center opacity-20">
            <p class="font-sigma text-[9px] tracking-[2em]">SIGMA VECTOR OS</p>
            <p class="khmer-moul text-xl mt-4">មាស ប៊ុណ្ណាVit</p>
        </footer>
    </div>

    <script>
        const subjects = [
            { day: 'ចន្ទ (Monday)', list: ['អង់គ្លេស', 'ប្រវត្តិវិទ្យា', 'គណិតវិទ្យា', 'គណិតវិទ្យា'], times: ['13:00', '14:00', '15:00', '16:00'] },
            { day: 'អង្គារ (Tuesday)', list: ['អក្សរសាស្ត្រខ្មែរ', 'ភាសាចិន', 'ផែនដីវិទ្យា', 'ភូមិវិទ្យា'], times: ['13:00', '14:00', '15:00', '16:00'] },
            { day: 'ពុធ (Wednesday)', list: ['គណិតវិទ្យា', 'គណិតវិទ្យា', 'គីមីវិទ្យា', 'ជីវវិទ្យា'], times: ['13:00', '14:00', '15:00', '16:00'] },
            { day: 'ព្រហស្បតិ៍ (Thursday)', list: ['អក្សរសាស្ត្រខ្មែរ', 'អក្សរសាស្ត្រខ្មែរ', 'សីលធម៌-ពលរដ្ឋ', 'ជីវវិទ្យា'], times: ['13:00', '14:00', '15:00', '16:00'] },
            { day: 'សុក្រ (Friday)', list: ['អក្សរសាស្ត្រខ្មែរ', 'អក្សរសាស្ត្រខ្មែរ', 'សីលធម៌-ពលរដ្ឋ', 'រូបវិទ្យា'], times: ['13:00', '14:00', '15:00', '16:00'] },
            { day: 'សៅរ៍ (Saturday)', list: ['ភូមិវិទ្យា', 'គណិតវិទ្យា', 'គណិតវិទ្យា', 'អង់គ្លេស'], times: ['13:00', '14:00', '15:00', '16:00'] }
        ];

        const memers = [
            { t: "SIGMA BOY", i: "https://files.catbox.moe/7d1nsp.jpeg" },
            { t: "The me", i: "https://files.catbox.moe/3nnv91.jpeg" },
            { t: "Alien", i: "https://files.catbox.moe/ktl2m7.jpeg" },
            { t: "Your Boyfriend", i: "https://files.catbox.moe/0g2t2o.jpeg" }
        ];

        const bgMusic = document.getElementById('bgMusic');
        const pingSfx = document.getElementById('pingSound');

        function launch(mode) {
            bgMusic.play().catch(() => {});
            document.getElementById('selector').style.opacity = '0';
            document.getElementById('modeStatus').innerText = `SESSION // ${mode.toUpperCase()}`;
            
            setTimeout(() => {
                document.getElementById('selector').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                renderSchedule();
                playNotifs();
                
                setTimeout(() => {
                    const el = document.querySelector('.active-card');
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 500);
            }, 600);
        }

        function playNotifs() {
            const container = document.getElementById('notifArea');
            memers.forEach((m, i) => {
                setTimeout(() => {
                    pingSfx.currentTime = 0;
                    pingSfx.play().catch(() => {});

                    const div = document.createElement('div');
                    div.className = 'sigma-notif';
                    div.innerHTML = `
                        <img src="${m.i}" class="notif-avatar" onerror="this.src='https://via.placeholder.com/65'">
                        <div class="flex-1">
                            <p class="font-sigma text-[7px] text-cyan-400 opacity-60">INCOMING_DATA</p>
                            <p class="text-sm font-bold">${m.t}</p>
                        </div>
                        <div class="progress-bar" style="animation: progress-out 4s linear forwards;"></div>
                    `;
                    container.appendChild(div);
                    setTimeout(() => div.classList.add('show'), 100);

                    setTimeout(() => {
                        div.classList.remove('show');
                        setTimeout(() => div.remove(), 700);
                    }, 4000);
                }, i * 1800);
            });
        }

        function renderSchedule() {
            const grid = document.getElementById('scheduleGrid');
            grid.innerHTML = '';
            
            const pph = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Phnom_Penh"}));
            let day = pph.getDay();
            let hr = pph.getHours();
            let target = (hr >= 21) ? (day + 1) % 7 : day;

            subjects.forEach((data, index) => {
                const dayNum = index + 1;
                const isActive = (dayNum === target);
                
                const card = document.createElement('div');
                card.className = `p-8 rounded-[40px] border transition-all duration-500 ${isActive ? 'active-card border-cyan-500/50 bg-cyan-500/5 shadow-2xl scale-105' : 'border-white/5 opacity-20 grayscale'}`;

                let html = '';
                data.list.forEach((s, i) => {
                    html += `
                        <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl mb-2 border border-transparent hover:border-cyan-500/30 transition-all">
                            <span class="font-bold text-sm">${s}</span>
                            <span class="font-sigma text-[8px] text-cyan-400 opacity-60">${data.times[i]}</span>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="khmer-moul text-xl ${isActive ? 'text-cyan-400' : ''}">${data.day}</h3>
                        ${isActive ? '<span class="px-3 py-1 bg-cyan-500 text-black font-sigma text-[8px] rounded-full">ACTIVE</span>' : ''}
                    </div>
                    <div>${html}</div>
                `;
                grid.appendChild(card);
            });
        }

        function updateClock() {
            const now = new Date();
            const time = now.toLocaleString("en-US", {timeZone: "Asia/Phnom_Penh", hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false});
            const date = now.toLocaleString("km-KH", {timeZone: "Asia/Phnom_Penh", weekday: 'long', day: 'numeric', month: 'long'});
            document.getElementById('clock').innerText = time;
            document.getElementById('date').innerText = date;
        }

        // Handle Sound Stop on Tab Leave
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) bgMusic.pause();
            else if (document.getElementById('app').style.display === 'block') bgMusic.play();
        });

        setInterval(updateClock, 1000);
        updateClock();

        // Create background particles
        const pContainer = document.getElementById('particles');
        for(let i=0; i<30; i++) {
            const p = document.createElement('div');
            p.style.position = 'absolute';
            p.style.width = '2px';
            p.style.height = '2px';
            p.style.background = 'white';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            p.style.opacity = Math.random() * 0.5;
            pContainer.appendChild(p);
        }
    </script>
    <style>
        @keyframes progress-out {
            from { transform: scaleX(1); }
            to { transform: scaleX(0); }
        }
    </style>
</body>
</html>
